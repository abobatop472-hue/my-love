<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Для тебя</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        button { 
            padding: 20px 40px; font-size: 24px; cursor: pointer; 
            background: transparent; color: #ff0055; border: 2px solid #ff0055; 
            border-radius: 50px; z-index: 10; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 0 10px #ff0055;
        }
        button:hover { background: #ff0055; color: white; box-shadow: 0 0 30px #ff0055; }
        canvas { position: absolute; top: 0; left: 0; }
    </style>
</head>
<body>

<button id="btn">Нажми посерединке</button>
<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let particles = [];
    const btn = document.getElementById('btn');

    class Particle {
        constructor(x, y) {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.targetX = x;
            this.targetY = y;
            // Делаем частицы чуть крупнее для "жирного" эффекта
            this.size = Math.random() * 8 + 4; 
        }
        draw() {
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ff0055';
            ctx.fillStyle = '#ff0055';
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
        update() {
            // Более медленное, плавное движение (0.02 вместо 0.05)
            this.x += (this.targetX - this.x) * 0.02;
            this.y += (this.targetY - this.y) * 0.02;
        }
    }

    btn.addEventListener('click', () => {
        btn.style.display = 'none';
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        
        for (let i = 0; i < 600; i++) {
            const t = Math.random() * Math.PI * 2;
            // Увеличили масштаб сердца (* 25 вместо * 20)
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            particles.push(new Particle(centerX + x * 25, centerY + y * 25 - 50));
        }

        function animate() {
            // Оставляем небольшой след, чтобы движение казалось мягче
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();
    });
</script>
</body>
</html>
