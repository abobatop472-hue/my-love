<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Сюрприз для тебя</title>
    <style>
        body { margin: 0; background: #ffe6e6; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        button { padding: 15px 30px; font-size: 20px; cursor: pointer; background: #ff4d6d; color: white; border: none; border-radius: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 10; transition: transform 0.2s; }
        button:hover { transform: scale(1.1); }
        canvas { position: absolute; top: 0; left: 0; }
    </style>
</head>
<body>

<button id="btn">Нажми посерединке</button>
<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let particles = [];
    const btn = document.getElementById('btn');

    class Particle {
        constructor(x, y) {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.targetX = x;
            this.targetY = y;
            this.color = Math.random() > 0.5 ? '#ff4d6d' : '#ff8fa3';
            this.size = Math.random() * 5 + 2;
        }
        draw() {
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
        update() {
            this.x += (this.targetX - this.x) * 0.05;
            this.y += (this.targetY - this.y) * 0.05;
        }
    }

    btn.addEventListener('click', () => {
        btn.style.display = 'none';
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        
        for (let i = 0; i < 500; i++) {
            // Формула сердца
            const t = Math.random() * Math.PI * 2;
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            particles.push(new Particle(centerX + x * 20, centerY + y * 20 - 50));
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();
    });
</script>
</body>
</html>
